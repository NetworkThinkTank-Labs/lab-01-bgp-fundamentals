! ============================================================
! R1 — Route Reflector Configuration (AS 65001)
! Lab 01: BGP Fundamentals | NetworkThinkTank Labs
! Platform: Cisco IOS-XE (CSR1000v)
! ============================================================

hostname R1

! Disable DNS lookup
no ip domain-lookup

! Enable password encryption
service password-encryption

! Logging configuration
logging buffered 16384
no logging console

! ---- Interface Configuration ----

interface Loopback0
 description ** Router-ID / BGP Update Source **
 ip address 10.0.0.1 255.255.255.255
 no shutdown

interface GigabitEthernet1
 description ** Link to R2 (iBGP peer) **
 ip address 10.1.12.1 255.255.255.252
 no shutdown

interface GigabitEthernet2
 description ** Link to R3 (eBGP peer - AS 65002) **
 ip address 10.1.13.1 255.255.255.252
 no shutdown

! ---- OSPF (IGP for iBGP Loopback Reachability) ----

router ospf 1
 router-id 10.0.0.1
 passive-interface default
 no passive-interface GigabitEthernet1
 network 10.0.0.1 0.0.0.0 area 0
 network 10.1.12.0 0.0.0.3 area 0

! ---- BGP Configuration ----

router bgp 65001
 bgp router-id 10.0.0.1
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 !
 ! iBGP Peer — R2 (Route Reflector Client)
 neighbor 10.0.0.2 remote-as 65001
 neighbor 10.0.0.2 description iBGP-to-R2
 neighbor 10.0.0.2 update-source Loopback0
 neighbor 10.0.0.2 password BGP-iBGP-KEY
 !
 ! eBGP Peer — R3 (AS 65002)
 neighbor 10.1.13.2 remote-as 65002
 neighbor 10.1.13.2 description eBGP-to-R3-AS65002
 neighbor 10.1.13.2 password BGP-eBGP-KEY
 !
 address-family ipv4 unicast
  network 10.0.0.1 mask 255.255.255.255
  !
  ! iBGP — R2 as Route Reflector Client
  neighbor 10.0.0.2 activate
  neighbor 10.0.0.2 route-reflector-client
  neighbor 10.0.0.2 next-hop-self
  neighbor 10.0.0.2 soft-reconfiguration inbound
  !
  ! eBGP — R3
  neighbor 10.1.13.2 activate
  neighbor 10.1.13.2 soft-reconfiguration inbound
  neighbor 10.1.13.2 route-map eBGP-IN-R3 in
  neighbor 10.1.13.2 prefix-list DENY-DEFAULT in
  !
  ! Route Aggregation
  aggregate-address 192.168.0.0 255.255.0.0 summary-only
 exit-address-family

! ---- Prefix Lists ----

ip prefix-list DENY-DEFAULT seq 5 deny 0.0.0.0/0
ip prefix-list DENY-DEFAULT seq 10 permit 0.0.0.0/0 le 32

! ---- Route Maps ----

route-map eBGP-IN-R3 permit 10
 set local-preference 200

! ---- Management ----

line con 0
 logging synchronous
 exec-timeout 30 0
line vty 0 4
 transport input ssh
 login local

! ---- End of Configuration ----

