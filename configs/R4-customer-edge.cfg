! ============================================================
! R4 — Customer Edge Router (AS 65003)
! Lab 01: BGP Fundamentals | NetworkThinkTank Labs
! ============================================================

hostname R4
no ip domain-lookup

interface Loopback0
 ip address 10.0.0.4 255.255.255.255

interface Loopback1
 description ** Customer Network **
 ip address 192.168.4.1 255.255.255.0

interface GigabitEthernet1
 description ** Link to R2 (eBGP - AS 65001) **
 ip address 10.1.24.2 255.255.255.252
 no shutdown

router bgp 65003
 bgp router-id 10.0.0.4
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 neighbor 10.1.24.1 remote-as 65001
 neighbor 10.1.24.1 description eBGP-to-R2-AS65001
 neighbor 10.1.24.1 password BGP-eBGP-KEY
 address-family ipv4 unicast
  network 192.168.4.0 mask 255.255.255.0
  network 10.0.0.4 mask 255.255.255.255
  neighbor 10.1.24.1 activate
  neighbor 10.1.24.1 soft-reconfiguration inbound
  ! AS-Path Prepending to make this path less preferred
  neighbor 10.1.24.1 route-map PREPEND-OUT out
 exit-address-family

route-map PREPEND-OUT permit 10
 set as-path prepend 65003 65003

line con 0
 logging synchronous
line vty 0 4
 transport input ssh
 login local

