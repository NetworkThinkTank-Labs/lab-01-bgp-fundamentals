! ============================================================
! R3 — Customer Edge Router (AS 65002)
! Lab 01: BGP Fundamentals | NetworkThinkTank Labs
! ============================================================

hostname R3
no ip domain-lookup

interface Loopback0
 ip address 10.0.0.3 255.255.255.255

interface Loopback1
 description ** Customer Network **
 ip address 192.168.3.1 255.255.255.0

interface GigabitEthernet1
 description ** Link to R1 (eBGP - AS 65001) **
 ip address 10.1.13.2 255.255.255.252
 no shutdown

router bgp 65002
 bgp router-id 10.0.0.3
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 neighbor 10.1.13.1 remote-as 65001
 neighbor 10.1.13.1 description eBGP-to-R1-AS65001
 neighbor 10.1.13.1 password BGP-eBGP-KEY
 address-family ipv4 unicast
  network 192.168.3.0 mask 255.255.255.0
  network 10.0.0.3 mask 255.255.255.255
  neighbor 10.1.13.1 activate
  neighbor 10.1.13.1 soft-reconfiguration inbound
 exit-address-family

line con 0
 logging synchronous
line vty 0 4
 transport input ssh
 login local

