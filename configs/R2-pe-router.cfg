! ============================================================
! R2 — PE Router Configuration (AS 65001)
! Lab 01: BGP Fundamentals | NetworkThinkTank Labs
! Platform: Cisco IOS-XE (CSR1000v)
! ============================================================

hostname R2
no ip domain-lookup
service password-encryption

interface Loopback0
 description ** Router-ID / BGP Update Source **
 ip address 10.0.0.2 255.255.255.255
 no shutdown

interface GigabitEthernet1
 description ** Link to R1 (iBGP peer) **
 ip address 10.1.12.2 255.255.255.252
 no shutdown

interface GigabitEthernet2
 description ** Link to R4 (eBGP peer - AS 65003) **
 ip address 10.1.24.1 255.255.255.252
 no shutdown

router ospf 1
 router-id 10.0.0.2
 passive-interface default
 no passive-interface GigabitEthernet1
 network 10.0.0.2 0.0.0.0 area 0
 network 10.1.12.0 0.0.0.3 area 0

router bgp 65001
 bgp router-id 10.0.0.2
 bgp log-neighbor-changes
 no bgp default ipv4-unicast
 neighbor 10.0.0.1 remote-as 65001
 neighbor 10.0.0.1 description iBGP-to-R1-RR
 neighbor 10.0.0.1 update-source Loopback0
 neighbor 10.0.0.1 password BGP-iBGP-KEY
 neighbor 10.1.24.2 remote-as 65003
 neighbor 10.1.24.2 description eBGP-to-R4-AS65003
 neighbor 10.1.24.2 password BGP-eBGP-KEY
 address-family ipv4 unicast
  network 10.0.0.2 mask 255.255.255.255
  neighbor 10.0.0.1 activate
  neighbor 10.0.0.1 next-hop-self
  neighbor 10.0.0.1 soft-reconfiguration inbound
  neighbor 10.1.24.2 activate
  neighbor 10.1.24.2 soft-reconfiguration inbound
 exit-address-family

line con 0
 logging synchronous
line vty 0 4
 transport input ssh
 login local
